name: unipast
description: "A cross-platform mobile education app for university students in Ghana."
publish_to: 'none'
version: 1.0.2+1

environment:
  sdk: '>=3.2.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  supabase_flutter: ^2.4.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  syncfusion_flutter_pdfviewer: ^28.0.0
  pdf: ^3.10.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.3
  flutter_local_notifications: ^17.0.0
  http: ^1.2.0
  universal_io: ^2.2.2
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  confetti: ^0.7.0
  file_picker: ^8.1.2
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.3
  url_launcher: ^6.2.5
  google_generative_ai: ^0.4.6
  flutter_markdown: ^0.7.4
  webview_flutter: ^4.7.1
  webview_flutter_android: ^3.15.0
  webview_flutter_wkwebview: ^3.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
